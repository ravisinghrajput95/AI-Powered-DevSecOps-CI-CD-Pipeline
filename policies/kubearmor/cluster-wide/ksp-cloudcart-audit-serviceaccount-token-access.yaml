apiVersion: security.kubearmor.com/v1
kind: KubeArmorPolicy
metadata:
  name: ksp-cloudcart-audit-serviceaccount-token-access
  namespace: cloudcart
  annotations:
    description: >-
      CUSTOM policy. Applies to every pod in the cloudcart namespace
      (backend, frontend, postgres alike — matchExpressions on `app`
      existing, not one specific app value) rather than just the backend,
      since the underlying gap is cluster-wide, not backend-specific.

      Directly a compensating control for an already-confirmed real
      finding from an earlier session: Workload Identity is disabled
      cluster-wide, both deployments run under the bare default
      ServiceAccount, and the node pool's Compute SA is scoped narrowly
      (roles/artifactregistry.reader only) — bounded, but real and
      unresolved as of that finding. Every pod still has the default SA's
      token auto-mounted regardless of whether the app code ever uses it
      (Kubernetes mounts it by default unless automountServiceAccountToken
      is explicitly set to false). An attacker who gains any code-
      execution foothold can use that mounted token to talk to the API
      server with whatever the default SA can do. This policy doesn't fix
      the underlying gap (that's the Terraform-level
      workload_metadata_config.mode fix already flagged in
      classify_finding.py's workload-identity-disabled category) — it
      detects ATTEMPTS to read the token, which is what lateral movement
      via this exact path looks like.

      FIXED 2026-06-23, confirmed via a real apply rejection: KubeArmor's
      matchExpressions is NOT a standard Kubernetes label selector, despite
      looking like one. The real CRD validation only accepts the literal
      key "label" (not arbitrary keys like "app") and operator In/NotIn
      (no Exists) — values are serialized "key=value" strings, not bare
      values. The three app values are listed explicitly below since
      there's no "any app label" wildcard available with this schema.
spec:
  severity: 9
  message: "Service account token file accessed"
  tags: ["MITRE-T1552.007", "lateral-movement-defense", "workload-identity-gap-compensation"]
  selector:
    matchExpressions:
      - key: label
        operator: In
        values:
          - app=cloudcart-backend
          - app=cloudcart-frontend
          - app=postgres
  file:
    matchPaths:
      - path: /var/run/secrets/kubernetes.io/serviceaccount/token
        readOnly: true
  action: Audit