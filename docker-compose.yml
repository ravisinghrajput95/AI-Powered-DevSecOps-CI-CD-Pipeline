services:
  postgres:
    image: postgres:13
    container_name: cloudcart-postgres
    environment:
      POSTGRES_DB: cloudcart
      POSTGRES_USER: cloudcart
      POSTGRES_PASSWORD: CloudCartDB_Pass123!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cloudcart-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: cloudcart-backend:latest
    container_name: cloudcart-backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://cloudcart:CloudCartDB_Pass123!@postgres:5432/cloudcart
      SECRET_KEY: cloudcart-super-secret-key-12345-do-not-share
      FLASK_DEBUG: "true"
    depends_on:
      - postgres
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - cloudcart-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: cloudcart-frontend:latest
    container_name: cloudcart-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - cloudcart-net

  prometheus:
    image: prom/prometheus:v2.37.0
    container_name: cloudcart-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - cloudcart-net

  grafana:
    image: grafana/grafana:9.0.0
    container_name: cloudcart-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - cloudcart-net

volumes:
  postgres_data:

networks:
  cloudcart-net:
    driver: bridge
