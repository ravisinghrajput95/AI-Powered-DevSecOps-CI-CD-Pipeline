name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "helm/cloudcart/charts/frontend/**"
      - "helm/cloudcart/Chart.yaml"
      - "helm/cloudcart/values.yaml"

  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - "helm/cloudcart/charts/frontend/**"
      - "helm/cloudcart/Chart.yaml"
      - "helm/cloudcart/values.yaml"

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_REPOSITORY_FRONTEND: ${{ secrets.GAR_REPOSITORY_FRONTEND }}
  GAR_REGION: ${{ secrets.GAR_REGION }}
  FRONTEND_IMAGE_NAME: ${{ secrets.FRONTEND_IMAGE_NAME }}

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:frontend -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/

  docker:
    name: Docker Build & Push to GCR
    runs-on: ubuntu-latest
    needs: [ build, test]
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
        with:
            version: '>= 363.0.0'

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker $GAR_REGION-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
           docker build \
           -t $GAR_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY_FRONTEND/$FRONTEND_IMAGE_NAME:${{ github.sha }} \
           -t $GAR_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY_FRONTEND/$FRONTEND_IMAGE_NAME:latest \
           ./frontend

      # Report-only, matching GitGuardian's warn-only philosophy elsewhere in
      # this pipeline: a critical CVE in a base image doesn't block the push.
      # Runs the Snyk CLI directly (rather than the snyk/actions/docker
      # wrapper action) for full control over JSON report generation —
      # the wrapper's SARIF output proved unreliable.
      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Scan image with Snyk
        id: snyk_scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set +e
          snyk container test \
            $GAR_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY_FRONTEND/$FRONTEND_IMAGE_NAME:${{ github.sha }} \
            --file=frontend/Dockerfile \
            --severity-threshold=critical \
            --json-file-output=snyk-frontend.json
          exit_code=$?
          set -e
          case $exit_code in
            0) echo "Snyk scan: no vulnerabilities at or above the threshold."; echo "completed=true" >> "$GITHUB_OUTPUT" ;;
            1) echo "Snyk scan: vulnerabilities found (report-only, not blocking push)."; echo "completed=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "::warning::Snyk scan did not complete cleanly (exit code $exit_code) — check the log above. The report may be missing or incomplete."; echo "completed=false" >> "$GITHUB_OUTPUT" ;;
          esac
          exit 0

      - name: Upload Snyk scan report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snyk-frontend-report
          path: snyk-frontend.json
          if-no-files-found: ignore

      - name: Normalize Snyk findings
        if: always()
        run: python3 scripts/normalize_snyk.py normalized-snyk-frontend.json snyk-frontend.json

      - name: Upload normalized Snyk findings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: normalized-snyk-frontend
          path: normalized-snyk-frontend.json
          if-no-files-found: ignore

      # See backend-ci.yaml's identical step for why this exists.
      - name: Record scan status
        if: always()
        run: |
          cat > scan_status_frontend_docker.json << EOF
          {"snyk": "${{ steps.snyk_scan.outputs.completed == 'true' && 'success' || 'failed' }}"}
          EOF
          cat scan_status_frontend_docker.json

      - name: Upload scan status
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scan-status-frontend-docker
          path: scan_status_frontend_docker.json

      # Scans the same local (pre-push) image — no registry auth needed, since
      # the Docker daemon already has it loaded from the build step above.
      # upload-artifact: false because the action's own built-in uploader
      # needs `contents: write`, which this job intentionally doesn't grant —
      # uploading explicitly below instead, same pattern as the Snyk report.
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY_FRONTEND }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom-frontend.spdx.json
          upload-artifact: false

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom-frontend
          path: sbom-frontend.spdx.json
          if-no-files-found: ignore

      - name: Normalize SBOM
        if: always()
        run: python3 scripts/normalize_sbom.py normalized-sbom-frontend.json sbom-frontend.spdx.json frontend

      - name: Upload normalized SBOM
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: normalized-sbom-frontend
          path: normalized-sbom-frontend.json
          if-no-files-found: ignore

      - name: Push Docker image
        run: |
           docker push $GAR_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY_FRONTEND/$FRONTEND_IMAGE_NAME:${{ github.sha }}
           docker push $GAR_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY_FRONTEND/$FRONTEND_IMAGE_NAME:latest

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Keyless signing: signs the image just pushed, using the GitHub Actions
      # OIDC token already enabled by `id-token: write` above (same permission
      # used for GCP WIF auth, different audience — no conflict). No private
      # key to store or rotate; Fulcio issues a short-lived cert tied to this
      # exact workflow/repo/commit, and the signature + cert are recorded in
      # Rekor's public transparency log.
      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign --yes \
            $GAR_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY_FRONTEND/$FRONTEND_IMAGE_NAME:${{ github.sha }}