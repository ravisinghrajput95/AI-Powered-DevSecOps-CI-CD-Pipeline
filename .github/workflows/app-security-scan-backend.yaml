name: App Security Scan (Backend)

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "sonar-project.properties"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write    # required for ggshield-action PR annotations
  security-events: write  # required for CodeQL SARIF upload
  packages: read          # required to fetch internal/private CodeQL packs
  actions: read           # required for CodeQL in private repos

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: GitGuardian secret scan — report only, never blocks
  # ─────────────────────────────────────────────────────────────
  gitguardian-scan:
    name: Scan for Secrets (Report Only)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: GitGuardian scan (GitHub annotation)
        id: ggshield
        uses: GitGuardian/ggshield-action@v1
        continue-on-error: true
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        with:
          args: --all-secrets

      - name: Install python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install ggshield (for JSON report)
        if: always()
        run: pip install ggshield --break-system-packages

      - name: Generate JSON findings report
        if: always()
        id: report
        continue-on-error: true
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          ggshield secret scan repo . --all-secrets --json > gitguardian-findings.json || true
          echo "Report saved to gitguardian-findings.json"
          cat gitguardian-findings.json

      # ─────────────────────────────────────────────────────────
      # Schema-independent check: a clean scan produces an empty
      # array "[]" (or near-empty content). Anything else means
      # findings exist.
      # ─────────────────────────────────────────────────────────
      - name: Check if findings exist
        if: always()
        id: check
        run: |
          if [ -s gitguardian-findings.json ] && [ "$(tr -d '[:space:]' < gitguardian-findings.json)" != "[]" ]; then
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
            echo "Findings detected — artifact will be uploaded."
          else
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            echo "No findings — skipping artifact upload."
          fi

      # ─────────────────────────────────────────────────────────
      # Normalize into shared schema for the final merge job.
      # See scripts/normalize_gitguardian.py for known schema caveats.
      # ─────────────────────────────────────────────────────────
      - name: Normalize GitGuardian findings
        if: always()
        run: python3 scripts/normalize_gitguardian.py normalized-gitguardian.json gitguardian-findings.json

      - name: Upload raw findings artifact
        if: always() && steps.check.outputs.has_findings == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: gitguardian-findings-backend-${{ github.run_id }}
          path: gitguardian-findings.json
          retention-days: 30
          if-no-files-found: warn

      - name: Upload normalized findings (for merge job)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: normalized-backend-gitguardian
          path: normalized-gitguardian.json
          retention-days: 1
          if-no-files-found: warn

      - name: Summarize outcome (non-blocking)
        if: always()
        run: |
          echo "GitGuardian annotation step outcome: ${{ steps.ggshield.outcome }}"
          echo "Findings present: ${{ steps.check.outputs.has_findings }}"
          echo "This job is report-only and does not block merges or deployments."

  # ─────────────────────────────────────────────────────────────
  # JOB 2: SonarCloud static analysis, scoped to backend/ only
  # ─────────────────────────────────────────────────────────────
  sonarcloud-backend:
    name: SonarCloud Analysis (Backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies (for accurate analysis)
        working-directory: backend
        run: pip install -r requirements.txt

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dproject.settings=sonar-project-backend.properties

      # ─────────────────────────────────────────────────────────
      # Poll SonarCloud's task API until analysis completes, then
      # fetch issues via the Web API and normalize. Avoids fetching
      # stale results from a previous scan (analysis is async).
      # ─────────────────────────────────────────────────────────
      - name: Fetch and normalize SonarCloud issues
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
        run: |
          python3 scripts/fetch_sonarcloud_issues.py \
            normalized-sonarcloud.json \
            cloudcart-backend \
            "$SONAR_TOKEN" \
            .scannerwork/report-task.txt

      - name: Upload normalized findings (for merge job)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: normalized-backend-sonarcloud
          path: normalized-sonarcloud.json
          retention-days: 1
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 2b: Snyk SCA — manifest-level scan of requirements.txt,
  # distinct from the container-image scan in backend-ci.yaml.
  # Same underlying tool/JSON shape (normalize_snyk.py handles
  # both), different scope: this catches issues pre-build, against
  # the dependency manifest itself, not the built image.
  # ─────────────────────────────────────────────────────────────
  snyk-sca-backend:
    name: Snyk SCA (Backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      # Snyk's Python scanning cross-references the manifest against what's
      # actually pip-installed (Python has no true universal lockfile the
      # way npm does) — without this, `snyk test` fails outright with
      # "Missing required packages" rather than scanning anything.
      - name: Install backend dependencies (required for Snyk to resolve the dependency tree)
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Scan dependencies with Snyk
        working-directory: backend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set +e
          # --all-projects scans every supported manifest, but it walks the
          # ENTIRE checkout recursively from the working directory — so this
          # MUST run from backend/, otherwise it also picks up frontend/'s
          # package.json and tags those npm findings as backend (confirmed
          # bug from a real run). working-directory scopes it cleanly without
          # needing --exclude (which can't take paths anyway).
          # Output written to the workspace root via an absolute path so the
          # later upload/normalize steps (which don't set working-directory)
          # still find it. Output is a JSON ARRAY (one object per manifest) —
          # normalize_snyk.py already handles both shapes.
          snyk test \
            --all-projects \
            --json-file-output="$GITHUB_WORKSPACE/snyk-sca-backend.json"
          exit_code=$?
          set -e
          case $exit_code in
            0) echo "Snyk SCA: no vulnerabilities found." ;;
            1) echo "Snyk SCA: vulnerabilities found (report-only, not blocking)." ;;
            *) echo "::warning::Snyk SCA did not complete cleanly (exit code $exit_code) — check the log above. The report may be missing or incomplete." ;;
          esac
          exit 0

      # Reports the dependency snapshot to the Snyk portal for ongoing
      # monitoring. This is a SIDE EFFECT for portal visibility only — it
      # does NOT feed ReleaseContext and must never gate the pipeline, so
      # it's isolated in its own step with `|| true` and continue-on-error:
      # a portal/network hiccup here can't fail the scan or block anything
      # downstream. Scoped to backend/ for the same reason as the scan above.
      - name: Report to Snyk portal (monitor, non-blocking)
        continue-on-error: true
        working-directory: backend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk monitor \
            --all-projects \
            || echo "::warning::snyk monitor did not complete — portal snapshot may be stale. This does not affect the scan results or the pipeline."

      # Raw report preserved as its own artifact — without this, an empty
      # normalized-snyk-sca.json is ambiguous between "genuinely clean scan"
      # and "Snyk silently failed to find the manifest", since both produce
      # an empty vulnerabilities[] after normalization. The raw report's
      # top-level "ok"/"dependencyCount"/error fields (stripped out by
      # normalize_snyk.py) are what actually disambiguates the two.
      - name: Upload raw Snyk SCA report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snyk-sca-backend-report
          path: snyk-sca-backend.json
          if-no-files-found: warn

      - name: Normalize Snyk SCA findings
        if: always()
        run: python3 scripts/normalize_snyk.py normalized-snyk-sca.json snyk-sca-backend.json

      - name: Upload normalized findings (for merge job)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: normalized-backend-snyk-sca
          path: normalized-snyk-sca.json
          retention-days: 1
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 3: CodeQL analysis — python + actions languages only
  # ─────────────────────────────────────────────────────────────
  codeql-analyze:
    name: CodeQL Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Run manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo 'Replace this with commands to build your code, for example:'
          echo '  make bootstrap'
          echo '  make release'
          exit 1

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
          upload: true
          output: sarif-results

      - name: Upload SARIF for reporting
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-backend-${{ matrix.language }}
          path: sarif-results/${{ matrix.language }}.sarif
          retention-days: 1
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Build a human-readable CSV report for THIS file's
  # 2 languages (python + actions), and normalize into shared
  # schema for the final merge job.
  # ─────────────────────────────────────────────────────────────
  codeql-report:
    name: CodeQL Report (Backend)
    runs-on: ubuntu-latest
    needs: codeql-analyze
    if: always()
    permissions:
      contents: read

    steps:
      - name: Checkout code (for scripts/)
        uses: actions/checkout@v6

      - name: Download SARIF artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sarif-backend-*
          path: sarif-downloads
          merge-multiple: false

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq

      - name: Convert SARIF findings to CSV
        run: |
          echo "language,rule_id,severity,message,file,start_line,end_line" > codeql-backend-report.csv

          for dir in sarif-downloads/sarif-backend-*/; do
            lang=$(basename "$dir" | sed 's/^sarif-backend-//')
            sarif_file=$(find "$dir" -name "*.sarif" | head -n 1)

            if [ -z "$sarif_file" ]; then
              echo "No SARIF file found for $lang, skipping."
              continue
            fi

            jq -r --arg lang "$lang" '
              .runs[].results[]? |
              [
                $lang,
                (.ruleId // "unknown"),
                (.level // "note"),
                (.message.text // "" | gsub(","; ";") | gsub("\n"; " ")),
                (.locations[0].physicalLocation.artifactLocation.uri // "unknown"),
                (.locations[0].physicalLocation.region.startLine // "" | tostring),
                (.locations[0].physicalLocation.region.endLine // "" | tostring)
              ] | @csv
            ' "$sarif_file" >> codeql-backend-report.csv
          done

          echo "----------------------------------------"
          cat codeql-backend-report.csv
          echo "----------------------------------------"
          echo "Total findings: $(($(wc -l < codeql-backend-report.csv) - 1))"

      - name: Normalize CodeQL findings
        run: |
          SARIF_FILES=$(find sarif-downloads -name "*.sarif")
          python3 scripts/normalize_codeql.py normalized-codeql.json $SARIF_FILES

      - name: Upload CSV report artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-backend-report-${{ github.run_id }}
          path: codeql-backend-report.csv
          retention-days: 30
          if-no-files-found: warn

      - name: Upload normalized findings (for merge job)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: normalized-backend-codeql
          path: normalized-codeql.json
          retention-days: 1
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 5: Merge all 3 tools' normalized findings into ONE file,
  # in the shared {tool, severity, category, rule_id, message,
  # file, line, confidence, recommendation} schema. This is what
  # feeds the AI agent. Also records each tool's job-level outcome
  # into scan_status_backend.json — this is what lets ReleaseContext
  # distinguish "this tool ran and found nothing" from "this tool
  # didn't run", instead of defaulting to "unknown" forever.
  # ─────────────────────────────────────────────────────────────
  normalize-and-merge:
    name: Merge Normalized Findings (Backend)
    runs-on: ubuntu-latest
    needs: [gitguardian-scan, sonarcloud-backend, snyk-sca-backend, codeql-report, codeql-analyze]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Checkout code (for scripts/)
        uses: actions/checkout@v6

      - name: Download all normalized findings
        uses: actions/download-artifact@v4
        with:
          pattern: normalized-backend-*
          path: normalized-downloads
          merge-multiple: true

      - name: Merge into final combined report
        run: |
          ls -la normalized-downloads/
          python3 scripts/merge_findings.py \
            security-findings-backend.json \
            normalized-downloads/normalized-gitguardian.json \
            normalized-downloads/normalized-sonarcloud.json \
            normalized-downloads/normalized-codeql.json \
            normalized-downloads/normalized-snyk-sca.json

      - name: Upload combined findings artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-findings-backend-${{ github.run_id }}
          path: security-findings-backend.json
          retention-days: 30
          if-no-files-found: warn

      # NOTE: needs.<job>.result reflects job-level conclusion. For
      # gitguardian-scan specifically, this job has continue-on-error: true
      # at the job level, so its result will read "success" even if the
      # ggshield step itself had an internal issue — this captures "did the
      # job run to completion", not finer step-level nuance. Good enough to
      # distinguish "tool didn't run at all" from "tool ran", which is the
      # gap this is meant to close; not precise beyond that.
      - name: Record scan status
        if: always()
        run: |
          # Normalize GH Actions' own result vocabulary (success/failure/
          # cancelled/skipped) into ours (success/failed/skipped) — folding
          # cancelled into failed, since both mean "no usable result", and
          # any unrecognized value fails safe to skipped rather than
          # claiming success.
          normalize_result() {
            case "$1" in
              success) echo "success" ;;
              failure) echo "failed" ;;
              cancelled) echo "failed" ;;
              skipped) echo "skipped" ;;
              *) echo "skipped" ;;
            esac
          }

          GITGUARDIAN_STATUS=$(normalize_result "${{ needs.gitguardian-scan.result }}")
          SONARCLOUD_STATUS=$(normalize_result "${{ needs.sonarcloud-backend.result }}")
          CODEQL_STATUS=$(normalize_result "${{ needs.codeql-analyze.result }}")
          SNYK_SCA_STATUS=$(normalize_result "${{ needs.snyk-sca-backend.result }}")

          cat > scan_status_backend.json << EOF
          {
            "gitguardian": "$GITGUARDIAN_STATUS",
            "sonarcloud": "$SONARCLOUD_STATUS",
            "codeql": "$CODEQL_STATUS",
            "snyk_sca": "$SNYK_SCA_STATUS"
          }
          EOF
          cat scan_status_backend.json

      - name: Upload scan status
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scan-status-backend
          path: scan_status_backend.json
          retention-days: 30
          if-no-files-found: warn