name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCR_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/cloudcart-backend
  #GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  #GKE_ZONE: ${{ secrets.GKE_ZONE }}

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install linting tools
        run: pip install black flake8 isort

      - name: Check formatting with black
        run: python -m black --check .

      - name: Run flake8
        run: python -m flake8 .
        # Uses root setup.cfg for config

      - name: Check import order with isort
        run: python -m isort --check-only .
  
  test:
    name: Run Pytest
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cloudcart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests
        working-directory: backend
        run: |
          if [ -d tests ]; then
            python -m pytest --cov=. --cov-report=xml --cov-report=term
          else
            echo "No tests found, skipping."
          fi
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cloudcart_test
          FLASK_ENV: testing
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.xml

  docker:
    name: Docker Build & Push to GCR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{env.GCP_PROJECT_ID}}/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: github-actions-sa@P${{env.GCP_PROJECT_ID}}.iam.gserviceaccount.com

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
        with:
            version: '>= 363.0.0'

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.GCR_IMAGE }}:${{ github.sha }} \
            -t ${{ env.GCR_IMAGE }}:latest \
            ./backend

      - name: Push Docker image to GCR
        run: |
          docker push ${{ env.GCR_IMAGE }}:${{ github.sha }}
          docker push ${{ env.GCR_IMAGE }}:latest  