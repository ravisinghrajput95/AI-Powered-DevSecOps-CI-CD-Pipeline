name: Terraform Security Scan (Checkov)

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  terraform-scan:
    name: Scan Terraform with Checkov
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Pinned to the exact version validated against this repo's real
      # terraform/ directory (2026-06-23) — Checkov ships new/changed rules
      # frequently, and an unpinned install would mean this scan's check
      # set silently drifts between runs instead of changing deliberately.
      - name: Install checkov
        run: pip install checkov==3.3.1

      # UNLIKE kube-linter/kubeconform, checkov's exit code is genuinely
      # meaningful: 0 = no failed checks, 1 = failed checks found (still a
      # normal, report-only outcome here — not a tool crash), anything
      # else = checkov itself didn't complete cleanly. Same case-statement
      # shape as kube-linter's step for consistency, but the semantics of
      # "1" differ (real findings vs. kube-linter's "lint ran, found
      # issues, also exits 1" — same end result, different reason).
      #
      # Checkov also tries to phone home to api0.prismacloud.io for BC_*
      # guideline mappings — expected to fail/warn here since the OSS
      # CKV_* checks don't need it, confirmed non-fatal in testing. Not
      # something to treat as a scan failure if it shows up in the log.
      - name: Run checkov
        id: checkov_run
        run: |
          set +e
          checkov -d terraform/ --output json --compact > checkov-report.json 2> checkov-stderr.log
          exit_code=$?
          set -e
          cat checkov-stderr.log || true
          case $exit_code in
            0) echo "checkov: no failed checks."; echo "status=success" >> "$GITHUB_OUTPUT" ;;
            1) echo "checkov: failed checks found (report-only, not blocking)."; echo "status=success" >> "$GITHUB_OUTPUT" ;;
            *) echo "::warning::checkov did not complete cleanly (exit code $exit_code) — check the log above. The report may be missing or incomplete."; echo "status=failed" >> "$GITHUB_OUTPUT" ;;
          esac

          # Extra safety net beyond exit code, same lesson as the Snyk SCA
          # empty-result trap: a tool can exit 0/1 (looks fine) while still
          # silently failing to parse one of the .tf files. Checkov surfaces
          # this in summary.parsing_errors, so check it explicitly rather
          # than trusting the exit code alone.
          if [ -s checkov-report.json ]; then
            parsing_errors=$(jq -r '.summary.parsing_errors // 0' checkov-report.json 2>/dev/null || echo 0)
            if [ "$parsing_errors" != "0" ]; then
              echo "::warning::checkov reported $parsing_errors parsing error(s) — some .tf files may not have been scanned. Check checkov-stderr.log."
              echo "status=failed" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::warning::checkov produced no output file at all (exit code $exit_code) — likely a real failure, not a clean/findings result."
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Upload raw checkov report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: checkov-report
          path: checkov-report.json
          if-no-files-found: warn

      - name: Normalize checkov findings
        if: always()
        run: python3 scripts/normalize_checkov.py normalized-checkov.json checkov-report.json

      - name: Upload normalized findings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: normalized-checkov
          path: normalized-checkov.json
          if-no-files-found: warn

      # Pinned for the same reproducibility reason as checkov==3.3.1 above.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      # Schema/internal-consistency VALIDITY gate, not a source of
      # findings — same role kubeconform plays for infra (separate from
      # checkov's security findings, same as kubeconform is separate from
      # kube-linter's). `validate` only checks HCL syntax, internal
      # references, and provider attribute schemas — it does not need real
      # GCP credentials (no API calls happen), so no secrets are required
      # here. -backend=false skips backend initialization entirely since
      # validate doesn't touch state.
      - name: terraform init (no backend, schema only)
        working-directory: terraform
        run: terraform init -backend=false -input=false

      - name: terraform validate
        id: terraform_validate_run
        working-directory: terraform
        run: |
          set +e
          terraform validate -json > terraform-validate.json
          exit_code=$?
          set -e
          if [ ! -s terraform-validate.json ]; then
            VALID="unknown"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "::warning::terraform validate produced no output at all (exit code $exit_code) — likely a real failure (e.g. init didn't complete), not a validation result."
          else
            VALID=$(jq -r '.valid' terraform-validate.json)
            echo "status=success" >> "$GITHUB_OUTPUT"
            if [ "$VALID" = "true" ]; then
              echo "terraform validate: configuration is valid."
            else
              echo "::warning::terraform validate found configuration errors (see terraform-validate.json) — this is a normal validity-gate result, not a tool failure."
            fi
          fi

          if [ -s terraform-validate.json ]; then
            jq -n --arg valid "$VALID" --slurpfile summary terraform-validate.json \
              '{valid: $valid, error_count: $summary[0].error_count, summary: $summary[0]}' > terraform_validation_status.json
          else
            jq -n --arg valid "$VALID" '{valid: $valid, error_count: null, summary: null}' > terraform_validation_status.json
          fi
          cat terraform_validation_status.json
          exit 0

      - name: Upload terraform validation status
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: terraform-validation-status
          path: terraform/terraform_validation_status.json
          if-no-files-found: warn

      # Uses the explicit output captured above, NOT step outcome — same
      # trap already hit twice this session (Snyk SCA, then defended
      # against proactively for infra): the scan step deliberately ends
      # with `exit 0` so findings don't fail the job, which means step
      # outcome would always read "success" regardless of what actually
      # happened.
      - name: Record scan status
        if: always()
        run: |
          cat > scan_status_terraform.json << EOF
          {
            "terraform": {
              "checkov": "${{ steps.checkov_run.outputs.status || 'skipped' }}",
              "terraform-validate": "${{ steps.terraform_validate_run.outputs.status || 'skipped' }}"
            }
          }
          EOF
          cat scan_status_terraform.json

      - name: Upload scan status
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scan-status-terraform
          path: scan_status_terraform.json
          if-no-files-found: warn