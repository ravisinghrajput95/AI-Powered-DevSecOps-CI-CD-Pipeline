name: Infra Security Scan (kube-linter + kubeconform)

on:
  push:
    branches:
      - main
    paths:
      - "helm/cloudcart/**"
      - "helm/postgresql/**"
      - "terraform/**"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  infra-scan:
    name: Lint and Validate Helm Charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      # No-op for these two charts today (charts/backend, charts/frontend are
      # local subdirectories, not .tgz dependencies) — kept as a safety net
      # in case that ever changes. monitoring/ is deliberately excluded
      # entirely: it has no Chart.yaml, it's just override values for an
      # external chart (kube-prometheus-stack), not a deployable chart of
      # its own — `helm template` can't render it.
      - name: Helm dependency build (safety net)
        run: |
          helm dependency build helm/cloudcart || true
          helm dependency build helm/postgresql || true

      # Rendered ONCE, here — both kube-linter and kubeconform lint this
      # same output, rather than each doing its own internal templating.
      # kube-linter can technically lint Helm charts directly, but using
      # its own chart-mode could resolve values differently than this
      # explicit -f call; rendering once and linting the rendered output
      # is the single-source-of-truth choice.
      # values.yaml only — confirmed this is what's actually deployed
      # (deploy-backend.yml/deploy-frontend.yml don't pass values-prod.yaml).
      - name: Render charts
        run: |
          mkdir -p rendered
          helm template cloudcart helm/cloudcart -f helm/cloudcart/values.yaml > rendered/cloudcart.yaml
          helm template postgresql helm/postgresql -f helm/postgresql/values.yaml > rendered/postgresql.yaml

      - name: Install kube-linter
        run: |
          curl -sL -o kube-linter https://github.com/stackrox/kube-linter/releases/latest/download/kube-linter-linux
          chmod +x kube-linter
          sudo mv kube-linter /usr/local/bin/

      - name: Run kube-linter
        id: kubelinter_run
        run: |
          set +e
          kube-linter lint rendered/ --format json > kubelinter-report.json
          exit_code=$?
          set -e
          case $exit_code in
            0) echo "kube-linter: no issues found."; echo "status=success" >> "$GITHUB_OUTPUT" ;;
            1) echo "kube-linter: issues found (report-only, not blocking)."; echo "status=success" >> "$GITHUB_OUTPUT" ;;
            *) echo "::warning::kube-linter did not complete cleanly (exit code $exit_code) — check the log above. The report may be missing or incomplete."; echo "status=failed" >> "$GITHUB_OUTPUT" ;;
          esac
          exit 0

      - name: Upload raw kube-linter report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kubelinter-report
          path: kubelinter-report.json
          if-no-files-found: warn

      - name: Normalize kube-linter findings
        if: always()
        run: python3 scripts/normalize_kubelinter.py normalized-kubelinter.json kubelinter-report.json

      - name: Upload normalized findings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: normalized-kubelinter
          path: normalized-kubelinter.json
          if-no-files-found: warn

      - name: Install kubeconform
        run: |
          curl -sL -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xzf kubeconform.tar.gz kubeconform
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/
          rm kubeconform.tar.gz

      # Schema VALIDITY gate, not a source of findings — deliberately kept
      # separate from kube-linter's security findings (see the design
      # discussion: kubeconform answers "does this render to valid
      # Kubernetes objects", not a security judgment). Exit code is the
      # reliable signal (0 = valid, non-zero = validation/processing
      # issues) — not attempting to deeply parse per-error JSON fields,
      # since this stays a pass/fail fact, not detailed findings.
      #
      # -schema-location additions (2026-06-23): kubeconform's built-in
      # "default" schemas only cover native Kubernetes types, not CRDs —
      # confirmed via a real run that this app's ServiceMonitor
      # (monitoring.coreos.com/v1, from the Prometheus Operator) failed
      # with "could not find schema for ServiceMonitor", which isn't a
      # real manifest problem, just a missing schema source. Second
      # -schema-location points at datreeio/CRDs-catalog (the standard
      # community catalog, officially recommended in kubeconform's own
      # README) using kubeconform's documented {{.Group}}/{{.ResourceKind}}
      # _{{.ResourceAPIVersion}}.json template — verified this resolves to
      # a real schema for this exact CRD before adding it here.
      # -ignore-missing-schemas added alongside it so a FUTURE CRD that's
      # in neither catalog degrades to "skipped" rather than flipping the
      # whole gate to invalid again, the same class of false signal this
      # fix addresses today.
      - name: Run kubeconform (schema validity gate)
        id: kubeconform_run
        run: |
          set +e
          kubeconform -summary -output json \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -ignore-missing-schemas \
            rendered/cloudcart.yaml rendered/postgresql.yaml > kubeconform-summary.json
          exit_code=$?
          set -e
          if [ ! -s kubeconform-summary.json ]; then
            VALID="unknown"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "::warning::kubeconform produced no output at all (exit code $exit_code) — likely a real failure, not a validation result."
          elif [ "$exit_code" -eq 0 ]; then
            VALID="true"
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "kubeconform: all rendered manifests are schema-valid."
          else
            VALID="false"
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "::warning::kubeconform found schema validation issues (exit code $exit_code) — see kubeconform-summary.json. This is a normal validity-gate result, not a tool failure."
          fi

          # jq, not an embedded Python heredoc — avoids the multi-line-
          # string-inside-a-YAML-block-scalar indentation trap.
          #
          # The `| if ... then true elif ... then false else null end`
          # conversion matters: --arg always binds a STRING even when its
          # content is the text "true" — confirmed this was producing
          # "valid": "true"/"false" as strings, not native JSON booleans.
          # null (not a third "unknown" string) represents the no-
          # determinate-answer case, so the field stays cleanly bool|null.
          if [ -s kubeconform-summary.json ]; then
            jq -n --arg valid "$VALID" --slurpfile summary kubeconform-summary.json \
              '{valid: ($valid | if . == "true" then true elif . == "false" then false else null end), summary: $summary[0]}' > kubeconform_status.json
          else
            jq -n --arg valid "$VALID" \
              '{valid: ($valid | if . == "true" then true elif . == "false" then false else null end), summary: null}' > kubeconform_status.json
          fi
          cat kubeconform_status.json
          exit 0

      - name: Upload kubeconform status
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kubeconform-status
          path: kubeconform_status.json
          if-no-files-found: warn

      # ── Terraform / Checkov — folded into this same infra-sec workflow
      # rather than a separate one, since both are "infrastructure
      # configuration", just two different layers (rendered K8s manifests
      # above vs. cloud resource declarations here). Everything above this
      # point is unchanged from the original kube-linter/kubeconform setup.
      - name: Install checkov
        run: pip install checkov==3.3.1

      # UNLIKE kube-linter/kubeconform, checkov's exit code is genuinely
      # meaningful: 0 = no failed checks, 1 = failed checks found (still a
      # normal, report-only outcome here — not a tool crash), anything
      # else = checkov itself didn't complete cleanly.
      #
      # Checkov also tries to phone home to api0.prismacloud.io for BC_*
      # guideline mappings — expected to fail/warn in a sandboxed runner
      # since the OSS CKV_* checks don't need it; confirmed non-fatal.
      - name: Run checkov
        id: checkov_run
        run: |
          set +e
          checkov -d terraform/ --output json --compact > checkov-report.json 2> checkov-stderr.log
          exit_code=$?
          set -e
          cat checkov-stderr.log || true
          case $exit_code in
            0) echo "checkov: no failed checks."; echo "status=success" >> "$GITHUB_OUTPUT" ;;
            1) echo "checkov: failed checks found (report-only, not blocking)."; echo "status=success" >> "$GITHUB_OUTPUT" ;;
            *) echo "::warning::checkov did not complete cleanly (exit code $exit_code) — check the log above. The report may be missing or incomplete."; echo "status=failed" >> "$GITHUB_OUTPUT" ;;
          esac

          # Extra safety net beyond exit code, same lesson as the Snyk SCA
          # empty-result trap: a tool can exit 0/1 (looks fine) while still
          # silently failing to parse one of the .tf files — checkov
          # surfaces this in summary.parsing_errors, so check it explicitly.
          if [ -s checkov-report.json ]; then
            parsing_errors=$(jq -r '.summary.parsing_errors // 0' checkov-report.json 2>/dev/null || echo 0)
            if [ "$parsing_errors" != "0" ]; then
              echo "::warning::checkov reported $parsing_errors parsing error(s) — some .tf files may not have been scanned. Check checkov-stderr.log."
              echo "status=failed" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::warning::checkov produced no output file at all (exit code $exit_code) — likely a real failure, not a clean/findings result."
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Upload raw checkov report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: checkov-report
          path: checkov-report.json
          if-no-files-found: warn

      - name: Normalize checkov findings
        if: always()
        run: python3 scripts/normalize_checkov.py normalized-checkov.json checkov-report.json

      - name: Upload normalized checkov findings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: normalized-checkov
          path: normalized-checkov.json
          if-no-files-found: warn

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      # Schema/internal-consistency VALIDITY gate, not a source of
      # findings — plays kubeconform's exact role, one layer over (HCL/
      # provider schema instead of K8s manifest schema). Does not need
      # real GCP credentials — `validate` makes no API calls, only checks
      # syntax, internal references, and provider attribute schemas.
      - name: terraform init (no backend, schema only)
        working-directory: terraform
        run: terraform init -backend=false -input=false

      - name: terraform validate
        id: terraform_validate_run
        working-directory: terraform
        run: |
          set +e
          terraform validate -json > terraform-validate.json
          exit_code=$?
          set -e
          if [ ! -s terraform-validate.json ]; then
            VALID="unknown"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "::warning::terraform validate produced no output at all (exit code $exit_code) — likely a real failure (e.g. init didn't complete), not a validation result."
          else
            VALID=$(jq -r '.valid' terraform-validate.json)
            echo "status=success" >> "$GITHUB_OUTPUT"
            if [ "$VALID" = "true" ]; then
              echo "terraform validate: configuration is valid."
            else
              echo "::warning::terraform validate found configuration errors (see terraform-validate.json) — this is a normal validity-gate result, not a tool failure."
            fi
          fi

          if [ -s terraform-validate.json ]; then
            jq -n --arg valid "$VALID" --slurpfile summary terraform-validate.json \
              '{valid: ($valid | if . == "true" then true elif . == "false" then false else null end), error_count: $summary[0].error_count, summary: $summary[0]}' > terraform_validation_status.json
          else
            jq -n --arg valid "$VALID" \
              '{valid: ($valid | if . == "true" then true elif . == "false" then false else null end), error_count: null, summary: null}' > terraform_validation_status.json
          fi
          cat terraform_validation_status.json
          # Copied to repo root (rather than uploaded from inside terraform/)
          # to match every other artifact in this workflow's flat-root
          # convention — avoids relying on untested assumptions about how
          # upload-artifact preserves/flattens a working-directory-relative
          # path when the artifact is later downloaded by infra-readiness.yml.
          cp terraform_validation_status.json "$GITHUB_WORKSPACE/terraform_validation_status.json"
          exit 0

      - name: Upload terraform validation status
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: terraform-validation-status
          path: terraform_validation_status.json
          if-no-files-found: warn

      # Uses the explicit outputs captured above, NOT step outcome — both
      # scan steps deliberately end with `exit 0` so a tool finding real
      # issues doesn't fail the job (report-only), which means step outcome
      # would always read "success" regardless of what actually happened.
      # Same trap already hit once this session with the Snyk SCA jobs.
      # scan_status_infra.json's "infrastructure" key is UNCHANGED from
      # before — "terraform" is a new sibling key added to the same file/
      # artifact (same artifact name: scan-status-infra), not a new file,
      # so the existing orchestrator's download loop needs only one
      # addition (see infra-readiness.yml) rather than a new lookup.
      #
      # Kyverno/KubeArmor moved OUT of this workflow (2026-06-23) — they're
      # runtime/admission-time tools grouped with DAST in a separate
      # workflow instead, since this workflow is for static, build-time
      # checks only (kube-linter, kubeconform, checkov, terraform validate
      # all assess config/manifests without anything running). See the
      # runtime-security workflow for kyverno/kubearmor/dast.
      - name: Record scan status
        if: always()
        run: |
          cat > scan_status_infra.json << EOF
          {
            "infrastructure": {
              "kube-linter": "${{ steps.kubelinter_run.outputs.status || 'skipped' }}",
              "kubeconform": "${{ steps.kubeconform_run.outputs.status || 'skipped' }}"
            },
            "terraform": {
              "checkov": "${{ steps.checkov_run.outputs.status || 'skipped' }}",
              "terraform-validate": "${{ steps.terraform_validate_run.outputs.status || 'skipped' }}"
            }
          }
          EOF
          cat scan_status_infra.json

      - name: Upload scan status
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scan-status-infra
          path: scan_status_infra.json
          if-no-files-found: warn