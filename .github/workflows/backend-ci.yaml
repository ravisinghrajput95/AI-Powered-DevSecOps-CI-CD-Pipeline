name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "helm/cloudcart/charts/backend/**"
      - "helm/cloudcart/Chart.yaml"
      - "helm/cloudcart/values.yaml"

  workflow_dispatch:
    
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - "helm/cloudcart/charts/backend/**"
      - "helm/cloudcart/Chart.yaml"
      - "helm/cloudcart/values.yaml"

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_REPOSITORY_BACKEND: ${{ secrets.GAR_REPOSITORY_BACKEND }}
  GAR_REGION: ${{ secrets.GAR_REGION }}
  BACKEND_IMAGE_NAME: ${{ secrets.BACKEND_IMAGE_NAME }}

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install linting tools
        run: pip install black flake8 isort

      - name: Check formatting with black
        run: python -m black --check .

      - name: Run flake8
        run: python -m flake8 .
        # Uses root setup.cfg for config

      - name: Check import order with isort
        run: python -m isort --check-only .
  
  test:
    name: Run Pytest
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cloudcart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests
        working-directory: backend
        run: |
          if [ -d tests ]; then
            python -m pytest --cov=. --cov-report=xml --cov-report=term
          else
            echo "No tests found, skipping."
          fi
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cloudcart_test
          FLASK_ENV: testing
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.xml

  docker:
    name: Docker Build & Push to GCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
        with:
            version: '>= 363.0.0'

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker $GAR_REGION-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
           docker build \
           -t $GAR_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY_BACKEND/$BACKEND_IMAGE_NAME:${{ github.sha }} \
           -t $GAR_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY_BACKEND/$BACKEND_IMAGE_NAME:latest \
           ./backend

      # Report-only, matching GitGuardian's warn-only philosophy elsewhere in
      # this pipeline: a critical CVE in a base image doesn't block the push,
      # but it is surfaced as a downloadable SARIF report for visibility.
      - name: Scan image with Snyk
        continue-on-error: true
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY_BACKEND }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
          args: --file=backend/Dockerfile --severity-threshold=critical --sarif-file-output=snyk-backend.sarif

      - name: Upload Snyk scan report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snyk-backend-report
          path: snyk-backend.sarif
          if-no-files-found: ignore

      - name: Push Docker image
        run: |
           docker push $GAR_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY_BACKEND/$BACKEND_IMAGE_NAME:${{ github.sha }}
           docker push $GAR_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY_BACKEND/$BACKEND_IMAGE_NAME:latest

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Keyless signing: signs the image just pushed, using the GitHub Actions
      # OIDC token already enabled by `id-token: write` above (same permission
      # used for GCP WIF auth, different audience — no conflict). No private
      # key to store or rotate; Fulcio issues a short-lived cert tied to this
      # exact workflow/repo/commit, and the signature + cert are recorded in
      # Rekor's public transparency log.
      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign --yes \
            $GAR_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY_BACKEND/$BACKEND_IMAGE_NAME:${{ github.sha }}