name: Release Readiness Assessment

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: "Commit SHA to assess (defaults to this ref's HEAD if left blank)"
        required: false
        type: string
      run_ai_analysis:
        description: "Also call the Claude API to generate the full report (costs tokens). Leave unchecked to only build release_context.json for inspection (Phase 1, free)."
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  actions: read

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_REGION: ${{ secrets.GAR_REGION }}
  GAR_REPOSITORY_BACKEND: ${{ secrets.GAR_REPOSITORY_BACKEND }}
  GAR_REPOSITORY_FRONTEND: ${{ secrets.GAR_REPOSITORY_FRONTEND }}
  BACKEND_IMAGE_NAME: ${{ secrets.BACKEND_IMAGE_NAME }}
  FRONTEND_IMAGE_NAME: ${{ secrets.FRONTEND_IMAGE_NAME }}
  GH_TOKEN: ${{ github.token }}

jobs:
  assess:
    name: Build ReleaseContext and Assess
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve release SHA
        id: resolve_sha
        run: |
          SHA="${{ inputs.release_sha }}"
          if [ -z "$SHA" ]; then
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Assessing commit: $SHA"

      # ── Download artifacts from the four upstream workflows ──────────────
      - name: Download upstream artifacts
        id: download
        env:
          SHA: ${{ steps.resolve_sha.outputs.sha }}
        run: |
          mkdir -p inputs
          echo "{}" > inputs/app_sec_provenance.json

          # FIXED 2026-06-27, mirroring the proven infra-readiness.yml fix:
          # this used to ONLY match the exact target SHA, which meant any
          # commit that didn't touch backend/**/frontend/** (e.g. a pure
          # scripts/ or workflow change) got ZERO app-sec data — every real
          # report so far has shown CodeQL/SonarCloud/GitGuardian/Snyk SCA
          # as SKIPPED because of exactly this. Falls back to the latest
          # successful run per workflow when no exact match exists, and
          # records which REAL commit was actually used — backend and
          # frontend can genuinely diverge (different last-touched
          # commits), so this is tracked per workflow, not as one global
          # assumption. Surfaced later as real provenance data, never a
          # silent assumption of freshness — same philosophy as every
          # other staleness-tracking fix in this pipeline.
          find_run_id() {
            local workflow=$1
            local run_id sha exact_match

            run_id=$(gh run list --workflow="$workflow" --status=success \
              --json databaseId,headSha --jq ".[] | select(.headSha == \"$SHA\") | .databaseId" \
              | head -n1)

            if [ -n "$run_id" ]; then
              sha="$SHA"
              exact_match="true"
            else
              local latest
              latest=$(gh run list --workflow="$workflow" --status=success \
                --json databaseId,headSha --jq '.[0]')
              run_id=$(echo "$latest" | jq -r '.databaseId // empty')
              sha=$(echo "$latest" | jq -r '.headSha // empty')
              exact_match="false"
              if [ -n "$run_id" ]; then
                echo "::warning::No successful run of $workflow found for commit $SHA — using latest successful run instead (commit $sha)."
              fi
            fi

            if [ -n "$run_id" ]; then
              jq --arg wf "$workflow" --arg sha "$sha" --arg exact "$exact_match" \
                '.[$wf] = {source_version: $sha, exact_match: ($exact == "true")}' \
                inputs/app_sec_provenance.json > /tmp/provenance_tmp.json && mv /tmp/provenance_tmp.json inputs/app_sec_provenance.json
            fi

            echo "$run_id"
          }

          download_or_warn() {
            local workflow=$1
            local artifact=$2
            local run_id
            run_id=$(find_run_id "$workflow")
            if [ -z "$run_id" ]; then
              echo "::warning::No successful run of $workflow found for commit $SHA — skipping artifact '$artifact'."
              return
            fi
            if gh run download "$run_id" -n "$artifact" -D inputs/ 2>/dev/null; then
              echo "Downloaded '$artifact' from $workflow run $run_id"
            else
              echo "::warning::Run $run_id of $workflow succeeded but artifact '$artifact' was not found — it may not have been produced this run."
            fi
          }

          # These artifact names are fixed across runs of the same workflow.
          download_or_warn "backend-ci.yaml" "normalized-snyk-backend"
          download_or_warn "backend-ci.yaml" "normalized-sbom-backend"
          download_or_warn "frontend-ci.yaml" "normalized-snyk-frontend"
          download_or_warn "frontend-ci.yaml" "normalized-sbom-frontend"
          download_or_warn "app-security-scan-backend.yaml" "scan-status-backend"
          download_or_warn "app-security-scan-frontend.yaml" "scan-status-frontend"

          # These two artifact names include the producing run's own ID
          # (e.g. "security-findings-backend-1234567"), so the exact name
          # has to be built from the run_id we just resolved rather than
          # being a fixed string.
          download_with_run_suffix() {
            local workflow=$1
            local base_name=$2
            local run_id
            run_id=$(find_run_id "$workflow")
            if [ -z "$run_id" ]; then
              echo "::warning::No successful run of $workflow found for commit $SHA — skipping '$base_name'."
              return
            fi
            local artifact="${base_name}-${run_id}"
            if gh run download "$run_id" -n "$artifact" -D inputs/ 2>/dev/null; then
              echo "Downloaded '$artifact' from $workflow run $run_id"
            else
              echo "::warning::Run $run_id of $workflow succeeded but artifact '$artifact' was not found."
            fi
          }

          download_with_run_suffix "app-security-scan-backend.yaml" "security-findings-backend"
          download_with_run_suffix "app-security-scan-frontend.yaml" "security-findings-frontend"

          # DAST/Kyverno/KubeArmor are all fundamentally different from the
          # four above: none are triggered by a commit (workflow_dispatch
          # only, scans/queries whatever's currently deployed/running).
          # There's no SHA to match against, so rather than forcing a
          # correlation that doesn't exist, this grabs the most recent
          # successful run of the combined runtime-security workflow and
          # records exactly when it happened — staleness becomes visible
          # data in ReleaseContext, not a hidden assumption of freshness.
          # All three now live in ONE workflow (folded together 2026-06-23
          # — DAST already tested the live deployed app; Kyverno's
          # PolicyReport query and KubeArmor's log capture are the same
          # kind of live-cluster signal, not commit-tied static checks),
          # so this is one workflow-name lookup + one run-id lookup,
          # reused for all three artifact downloads below.
          #
          # Resolved by workflow NAME via the Actions API, not by filename
          # via `gh run list --workflow=<file>.yml` — the latter requires the
          # file to exist on the default branch to resolve at all, which
          # fails with a 404 even when the workflow has real successful runs,
          # if the file currently lives on a different branch or was renamed.
          RUNTIME_WORKFLOW_ID=$(gh api "repos/${{ github.repository }}/actions/workflows" \
            --jq '.workflows[] | select(.name=="Runtime Security Scan (DAST + Kyverno + KubeArmor)") | .id' | head -n1)

          if [ -z "$RUNTIME_WORKFLOW_ID" ]; then
            echo "::warning::No workflow named 'Runtime Security Scan (DAST + Kyverno + KubeArmor)' found via the Actions API — deployed-app findings will be absent from ReleaseContext. Check that runtime-security-scan.yaml has been pushed and run at least once."
          else
            RUNTIME_RUN_ID=$(gh run list --workflow="$RUNTIME_WORKFLOW_ID" --status=success \
              --json databaseId --jq '.[0].databaseId')

            if [ -z "$RUNTIME_RUN_ID" ]; then
              echo "::warning::Found the runtime-security workflow but no successful run of it — deployed-app findings will be absent from ReleaseContext."
            else
              SCANNED_AT=$(gh run view "$RUNTIME_RUN_ID" --json createdAt --jq '.createdAt')

              for pair in "normalized-zap:dast" "normalized-kyverno:kyverno" "normalized-kubearmor:kubearmor"; do
                artifact="${pair%%:*}"
                metadata_name="${pair##*:}"
                if gh run download "$RUNTIME_RUN_ID" -n "$artifact" -D inputs/ 2>/dev/null; then
                  printf '{"run_id": "%s", "scanned_at": "%s"}' "$RUNTIME_RUN_ID" "$SCANNED_AT" > "inputs/${metadata_name}_metadata.json"
                  echo "Downloaded '$artifact' from run $RUNTIME_RUN_ID (scanned at $SCANNED_AT)"
                else
                  echo "::warning::Run $RUNTIME_RUN_ID succeeded but artifact '$artifact' was not found."
                fi
              done
            fi
          fi

          echo "--- Contents of inputs/ ---"
          ls -la inputs/ || echo "(nothing downloaded)"

      # ── Live signature verification (not relayed from an earlier job) ────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 363.0.0"

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker $GAR_REGION-docker.pkg.dev --quiet

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify image signatures
        id: verify
        env:
          SHA: ${{ steps.resolve_sha.outputs.sha }}
        run: |
          verify_one() {
            local component=$1
            local repo_secret=$2
            local image_name_secret=$3
            local workflow_file=$4
            local image="$GAR_REGION-docker.pkg.dev/$GCP_PROJECT_ID/${!repo_secret}/${!image_name_secret}:$SHA"

            set +e
            cosign verify \
              --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/${workflow_file}@refs/heads/main" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$image" > "${component}_verify.log" 2>&1
            echo $? > "${component}_verify_exit.txt"
            set -e
          }

          verify_one backend GAR_REPOSITORY_BACKEND BACKEND_IMAGE_NAME backend-ci.yaml
          verify_one frontend GAR_REPOSITORY_FRONTEND FRONTEND_IMAGE_NAME frontend-ci.yaml

      - name: Build supply_chain.json from verification results
        run: |
          python3 - << 'EOF'
          import json

          def read_exit(path):
              with open(path) as f:
                  return int(f.read().strip())

          def read_log(path):
              with open(path) as f:
                  return f.read()

          result = {}
          for component in ("backend", "frontend"):
              exit_code = read_exit(f"{component}_verify_exit.txt")
              verified = exit_code == 0
              # cosign verify's failure mode doesn't cleanly distinguish "never
              # signed" from "signed but verification failed" without parsing
              # its error text, which we deliberately don't do here — both
              # fields move together off the same exit code rather than
              # claiming precision we don't have.
              result[component] = {
                  "image_signed": "unknown" if not verified else True,
                  "signature_verified": verified,
                  "verification_notes": "verified" if verified else read_log(f"{component}_verify.log")[-500:],
              }

          with open("inputs/supply_chain.json", "w") as f:
              json.dump(result, f, indent=2)
          print(json.dumps(result, indent=2))
          EOF

      # ── Merge per-component scan_status files into the combined shape
      # build_release_context.py expects: {"backend": {...}, "frontend": {...}}.
      # snyk/syft aren't tracked upstream yet (backend-ci.yaml/frontend-ci.yaml
      # don't record their own outcomes into a status file), so those two
      # default to "unknown" here rather than being guessed.
      - name: Merge scan status
        run: |
          python3 - << 'EOF'
          import json
          import os

          # codeql/sonarcloud/gitguardian/snyk_sca are what
          # app-security-scan-*.yaml actually tracks. "snyk" here means the
          # CONTAINER scan's status specifically (a different key from
          # snyk_sca) — still not instrumented, since that status comes from
          # backend-ci.yaml/frontend-ci.yaml, which doesn't write a
          # scan-status file yet. Same for syft. Two different kinds of "we
          # don't know": one because this release's scan never ran, one
          # because nothing has ever recorded this tool's status regardless
          # of release.
          TRACKED_BY_SECURITY_SCAN = ("codeql", "sonarcloud", "gitguardian", "snyk_sca")
          NOT_INSTRUMENTED = ("snyk", "syft")

          def build_component_status(status_path):
              if not os.path.exists(status_path):
                  result = {t: "skipped" for t in TRACKED_BY_SECURITY_SCAN}
                  result.update({t: "not_configured" for t in NOT_INSTRUMENTED})
                  return result
              with open(status_path) as f:
                  raw = json.load(f)
              result = {t: raw.get(t, "skipped") for t in TRACKED_BY_SECURITY_SCAN}
              result.update({t: "not_configured" for t in NOT_INSTRUMENTED})
              return result

          backend = build_component_status("inputs/scan_status_backend.json")
          frontend = build_component_status("inputs/scan_status_frontend.json")

          with open("inputs/scan_status.json", "w") as f:
              json.dump({"backend": backend, "frontend": frontend}, f, indent=2)
          print(json.dumps({"backend": backend, "frontend": frontend}, indent=2))
          EOF

      # ── Phase 1: deterministic ReleaseContext build (always runs, free) ──
      - name: Build ReleaseContext
        env:
          SHA: ${{ steps.resolve_sha.outputs.sha }}
        run: |
          ARGS=(--output release_context.json --release-version "$SHA" --repository "${{ github.repository }}")
          [ -f inputs/app_sec_provenance.json ] && ARGS+=(--app-sec-provenance inputs/app_sec_provenance.json)
          [ -f inputs/security-findings-backend.json ] && ARGS+=(--backend-findings inputs/security-findings-backend.json)
          [ -f inputs/normalized-snyk-backend.json ] && ARGS+=(--backend-snyk inputs/normalized-snyk-backend.json)
          [ -f inputs/normalized-sbom-backend.json ] && ARGS+=(--backend-sbom inputs/normalized-sbom-backend.json)
          [ -f inputs/security-findings-frontend.json ] && ARGS+=(--frontend-findings inputs/security-findings-frontend.json)
          [ -f inputs/normalized-snyk-frontend.json ] && ARGS+=(--frontend-snyk inputs/normalized-snyk-frontend.json)
          [ -f inputs/normalized-sbom-frontend.json ] && ARGS+=(--frontend-sbom inputs/normalized-sbom-frontend.json)
          [ -f inputs/normalized-zap.json ] && ARGS+=(--dast-findings inputs/normalized-zap.json)
          [ -f inputs/dast_metadata.json ] && ARGS+=(--dast-metadata inputs/dast_metadata.json)
          [ -f inputs/normalized-kyverno.json ] && ARGS+=(--kyverno-findings inputs/normalized-kyverno.json)
          [ -f inputs/kyverno_metadata.json ] && ARGS+=(--kyverno-metadata inputs/kyverno_metadata.json)
          [ -f inputs/normalized-kubearmor.json ] && ARGS+=(--kubearmor-findings inputs/normalized-kubearmor.json)
          [ -f inputs/kubearmor_metadata.json ] && ARGS+=(--kubearmor-metadata inputs/kubearmor_metadata.json)
          ARGS+=(--supply-chain inputs/supply_chain.json)
          ARGS+=(--scan-status inputs/scan_status.json)
          # No --risk-acceptance passed: no exception-tracking system exists yet.

          python3 scripts/build_release_context.py "${ARGS[@]}"

      - name: Upload ReleaseContext
        uses: actions/upload-artifact@v7
        with:
          name: release-context
          path: release_context.json

      # ── Compose step: the ONE merge point. final_release_context.json is
      # what every downstream consumer (AI agent, Markdown, Slack, PR
      # comment, dashboard) should read — never release_context.json or
      # infra_context.json directly. Per the frozen v1.0 design: infra_sec
      # isn't commit-tied the way app-sec is (infra-security-scan.yaml only
      # triggers on helm/**, terraform/** changes), so this deliberately
      # grabs the LATEST successful "Infra Readiness Assessment" run rather
      # than one matching this exact SHA — a matching one almost never
      # exists for a pure app-code commit. The version mismatch this
      # produces is expected and surfaced as provenance data by
      # compose_release_context.py itself, not something to resolve here.
      - name: Find latest InfraContext
        id: find_infra_context
        run: |
          INFRA_WORKFLOW_ID=$(gh api "repos/${{ github.repository }}/actions/workflows" \
            --jq '.workflows[] | select(.name=="Infra Readiness Assessment") | .id' | head -n1)

          if [ -z "$INFRA_WORKFLOW_ID" ]; then
            echo "::warning::No workflow named 'Infra Readiness Assessment' found — composing without infra/terraform findings."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            INFRA_RUN_ID=$(gh run list --workflow="$INFRA_WORKFLOW_ID" --status=success \
              --json databaseId --jq '.[0].databaseId')
            if [ -z "$INFRA_RUN_ID" ]; then
              echo "::warning::Found the workflow but no successful run — composing without infra/terraform findings."
              echo "found=false" >> "$GITHUB_OUTPUT"
            elif gh run download "$INFRA_RUN_ID" -n infra-context -D inputs/ 2>/dev/null; then
              echo "found=true" >> "$GITHUB_OUTPUT"
              echo "Downloaded infra_context.json from run $INFRA_RUN_ID"
            else
              echo "::warning::Run $INFRA_RUN_ID succeeded but its 'infra-context' artifact wasn't found."
              echo "found=false" >> "$GITHUB_OUTPUT"
            fi
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Compose final ReleaseContext
        run: |
          if [ "${{ steps.find_infra_context.outputs.found }}" = "true" ]; then
            python3 scripts/compose_release_context.py \
              --output final_release_context.json \
              --release-context release_context.json \
              --infra-context inputs/infra_context.json
          else
            # No infra_context.json available at all (not even a stale
            # one) — compose still has to run so downstream consumers have
            # exactly one place to read from, never falling back to
            # release_context.json directly.
            echo "{\"release\":{\"repository\":\"${{ github.repository }}\"},\"findings\":[],\"remediation_guide\":{},\"scan_status\":{}}" > /tmp/empty_infra_context.json
            python3 scripts/compose_release_context.py \
              --output final_release_context.json \
              --release-context release_context.json \
              --infra-context /tmp/empty_infra_context.json
          fi

      - name: Upload final ReleaseContext
        uses: actions/upload-artifact@v7
        with:
          name: final-release-context
          path: final_release_context.json

      # ── Phase 2: AI analysis — only runs if explicitly requested ─────────
      # ── Phase 2: AI Release Intelligence — only runs if explicitly requested ──
      # Two genuinely separate steps, per the frozen three-layer separation:
      # AI Release Intelligence -> ExecutiveReport.json -> Renderer -> Markdown.
      # The AI step never produces Markdown; the renderer never calls the model.
      - name: Run AI Release Intelligence Engine
        if: ${{ inputs.run_ai_analysis }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install jsonschema --break-system-packages -q
          python3 scripts/run_security_analysis.py \
            --release-context final_release_context.json \
            --system-prompt scripts/system_prompt.md \
            --output executive_report.json

      - name: Upload ExecutiveReport
        if: ${{ inputs.run_ai_analysis }}
        uses: actions/upload-artifact@v7
        with:
          name: executive-report
          path: executive_report.json

      - name: Render Markdown report
        if: ${{ inputs.run_ai_analysis }}
        run: |
          python3 scripts/render_report.py \
            --executive-report executive_report.json \
            --release-context final_release_context.json \
            --output release_report.md

      - name: Render HTML report
        if: ${{ inputs.run_ai_analysis }}
        run: |
          python3 scripts/render_html_report.py \
            --executive-report executive_report.json \
            --release-context final_release_context.json \
            --output release_report.html

      - name: Upload AI Security Report
        if: ${{ inputs.run_ai_analysis }}
        uses: actions/upload-artifact@v7
        with:
          name: release-security-report
          path: |
            release_report.md
            release_report.html