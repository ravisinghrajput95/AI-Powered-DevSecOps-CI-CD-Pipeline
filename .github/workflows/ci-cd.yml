name: CloudCart CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend
  # VULN: Secrets in workflow env (for Gitleaks demo)
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  # ─── SAST & Secret Scanning ───────────────────────────────────────────
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=cloudcart
            -Dsonar.sources=backend,frontend/src
            -Dsonar.python.version=3.7
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ─── Dependency Scanning ──────────────────────────────────────────────
  dependency-scan:
    name: Dependency Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.7'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '14'

      - name: Snyk Open Source - Python
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=backend/requirements-vulnerable.txt --severity-threshold=low

      - name: Snyk Open Source - Node
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=frontend/package.json --severity-threshold=low

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json

  # ─── Build & Test ─────────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.7'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint backend
        run: pip install flake8 && flake8 backend/ --max-line-length=120 || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

  # ─── Container Build & Scan ───────────────────────────────────────────
  container-build:
    name: Build & Scan Containers
    runs-on: ubuntu-latest
    needs: [build-test, dependency-scan]
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
          load: true

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
          load: true

      - name: Snyk Container Scan - Backend
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
          args: --severity-threshold=low

      - name: Snyk Container Scan - Frontend
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
          args: --severity-threshold=low

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container images
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest || true
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest || true
        env:
          COSIGN_EXPERIMENTAL: "1"

  # ─── IaC & K8s Policy Scanning ────────────────────────────────────────
  policy-scan:
    name: Policy & IaC Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkov Terraform Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-terraform.sarif
        continue-on-error: true

      - name: Checkov Kubernetes Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          framework: kubernetes
          output_format: sarif
        continue-on-error: true

      - name: Checkov Helm Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: helm/
          framework: helm
        continue-on-error: true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-terraform.sarif
        continue-on-error: true

  # ─── Deploy to Kubernetes ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [container-build, policy-scan]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Verify Cosign signatures
        run: |
          cosign verify ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest || echo "Signature verification skipped"
        continue-on-error: true

      - name: Deploy with Helm
        run: |
          helm upgrade --install cloudcart ./helm/cloudcart \
            --namespace cloudcart \
            --create-namespace \
            --wait --timeout 5m
        continue-on-error: true

      - name: Apply Kyverno policies
        run: kubectl apply -f security/kyverno/ || true
        continue-on-error: true

  # ─── Notifications ────────────────────────────────────────────────────
  notify:
    name: Notifications
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: always()
    steps:
      - name: Slack Notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "CloudCart Pipeline: ${{ job.status }}\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

      - name: Create Jira Ticket on Failure
        if: failure()
        run: |
          curl -X POST \
            -H "Authorization: Basic ${{ secrets.JIRA_AUTH }}" \
            -H "Content-Type: application/json" \
            -d '{
              "fields": {
                "project": {"key": "SEC"},
                "summary": "CloudCart Pipeline Failure - ${{ github.sha }}",
                "description": "Pipeline failed for commit ${{ github.sha }} on branch ${{ github.ref_name }}",
                "issuetype": {"name": "Bug"}
              }
            }' \
            "${{ secrets.JIRA_URL }}/rest/api/2/issue" || true
        continue-on-error: true
