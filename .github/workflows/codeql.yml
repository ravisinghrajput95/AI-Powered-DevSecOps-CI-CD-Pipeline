name: "CodeQL Advanced"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '45 5 * * 1'
jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      # required for all workflows
      security-events: write
      # required to fetch internal or private CodeQL packs
      packages: read
      # only required for workflows in private repositories
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: javascript-typescript
          build-mode: none
        - language: python
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
    - name: Run manual build steps
      if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        echo 'If you are using a "manual" build mode for one or more of the' \
          'languages you are analyzing, replace this with the commands to build' \
          'your code, for example:'
        echo '  make bootstrap'
        echo '  make release'
        exit 1
    - name: Perform CodeQL Analysis
      id: analyze
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
        upload: true
        output: sarif-results

    # ─────────────────────────────────────────────────────────
    # Hand off this language's raw SARIF to the combining job.
    # Each matrix run uploads its own small intermediate artifact;
    # nothing readable here yet — the final report job downloads
    # all of these and merges them into one CSV.
    # ─────────────────────────────────────────────────────────
    - name: Upload SARIF for combining
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sarif-${{ matrix.language }}
        path: sarif-results/${{ matrix.language }}.sarif
        retention-days: 1
        if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # Runs once after all matrix languages finish. Downloads every
  # language's SARIF, converts findings to a single combined CSV,
  # and uploads that as the final human-readable report artifact.
  # ─────────────────────────────────────────────────────────────
  report:
    name: Generate Combined Report
    runs-on: ubuntu-latest
    needs: analyze
    if: always()
    permissions:
      contents: read

    steps:
      - name: Download all SARIF artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sarif-*
          path: sarif-downloads
          merge-multiple: false

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq

      - name: Convert SARIF findings to combined CSV
        run: |
          echo "language,rule_id,severity,message,file,start_line,end_line" > codeql-report.csv

          for dir in sarif-downloads/sarif-*/; do
            lang=$(basename "$dir" | sed 's/^sarif-//')
            sarif_file=$(find "$dir" -name "*.sarif" | head -n 1)

            if [ -z "$sarif_file" ]; then
              echo "No SARIF file found for $lang, skipping."
              continue
            fi

            jq -r --arg lang "$lang" '
              .runs[].results[]? |
              [
                $lang,
                (.ruleId // "unknown"),
                (.level // "note"),
                (.message.text // "" | gsub(","; ";") | gsub("\n"; " ")),
                (.locations[0].physicalLocation.artifactLocation.uri // "unknown"),
                (.locations[0].physicalLocation.region.startLine // "" | tostring),
                (.locations[0].physicalLocation.region.endLine // "" | tostring)
              ] | @csv
            ' "$sarif_file" >> codeql-report.csv
          done

          echo "----------------------------------------"
          echo "Combined report preview:"
          cat codeql-report.csv
          echo "----------------------------------------"
          echo "Total findings: $(($(wc -l < codeql-report.csv) - 1))"

      - name: Upload combined report artifact
        uses: actions/upload-artifact@v7
        with:
          name: codeql-combined-report-${{ github.run_id }}
          path: codeql-report.csv
          retention-days: 30
          if-no-files-found: warn